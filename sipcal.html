<title>SIP Calculator - Code2Capital</title>

</head>

<body>

<header>
  <h1>Code2Capital</h1>
  <a href="index.html">⬅ Back to Home</a>
</header>

<section class="container">
  <h2>SIP Calculator</h2>

  <div class="calculator-card">
    
    <label>Monthly Investment (₹)</label>
    <input type="number" id="monthly" placeholder="Enter amount">

    <label>Expected Annual Return (%)</label>
    <input type="number" id="rate" placeholder="e.g. 12">

    <label>Time Period (Years)</label>
    <input type="number" id="years" placeholder="e.g. 5">

    <button onclick="calculateSIP()">Calculate</button>

    <div id="result"></div>

  </div>
</section>

<script>
function calculateSIP(){
  let monthly = document.getElementById("monthly").value;
  let rate = document.getElementById("rate").value / 100 / 12;
  let years = document.getElementById("years").value * 12;

  if(monthly === "" || rate === "" || years === ""){
    document.getElementById("result").innerHTML = "Please fill all fields.";
    return;
  }

  let futureValue = monthly * (((Math.pow(1 + rate, years) - 1) / rate) * (1 + rate));

  document.getElementById("result").innerHTML =
    "Estimated Value: ₹" + futureValue.toFixed(0);
}
</script>

</body>
