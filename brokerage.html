<title>Brokerage Calculator - Code2Capital</title>

<link rel="stylesheet" href="sip.css">
</head>

<body>

<header>
  <h1>Code2Capital</h1>
  <a href="index.html">⬅ Back to Home</a>
</header>

<section class="container">
  <h2>Brokerage Calculator</h2>

  <div class="calculator-card">
    
    <label>Buying Price (₹)</label>
    <input type="number" id="buy" placeholder="Enter buying price">

    <label>Selling Price (₹)</label>
    <input type="number" id="sell" placeholder="Enter selling price">

    <label>Quantity</label>
    <input type="number" id="qty" placeholder="Number of shares">

    <label>Brokerage Per Order (₹)</label>
    <input type="number" id="brokerage" placeholder="e.g. 20">

    <button onclick="calculateBrokerage()">Calculate</button>

    <div id="result"></div>

  </div>
</section>

<script>
function calculateBrokerage(){
  let buy = parseFloat(document.getElementById("buy").value);
  let sell = parseFloat(document.getElementById("sell").value);
  let qty = parseFloat(document.getElementById("qty").value);
  let brokerage = parseFloat(document.getElementById("brokerage").value);

  if(isNaN(buy) || isNaN(sell) || isNaN(qty) || isNaN(brokerage)){
    document.getElementById("result").innerHTML = "Please fill all fields.";
    return;
  }

  let totalInvestment = buy * qty;
  let totalReturn = sell * qty;
  let grossProfit = totalReturn - totalInvestment;

  let totalBrokerage = brokerage * 2; // buy + sell
  let netProfit = grossProfit - totalBrokerage;

  let color = netProfit >= 0 ? "#22c55e" : "red";

  document.getElementById("result").innerHTML = `
    <p>Gross Profit: ₹${grossProfit.toFixed(2)}</p>
    <p>Total Brokerage: ₹${totalBrokerage.toFixed(2)}</p>
    <p style="color:${color};">
      Net ${netProfit >= 0 ? "Profit" : "Loss"}: ₹${netProfit.toFixed(2)}
    </p>
  `;
}
</script>

</body>
</html>
