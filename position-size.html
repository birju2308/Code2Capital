<title>Position Size Calculator | Code2Capital</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#111827;
padding:20px;
}

header h1{
color:#22c55e;
}

.container{
padding:50px 20px;
}

.calculator{
background:#1e293b;
max-width:400px;
margin:auto;
padding:30px;
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#22c55e;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
color:#22c55e;
}

</style>

</head>

<body>

<header>
<h1>Position Size Calculator</h1>
</header>

<div class="container">

<div class="calculator">

<label>Account Size (₹)</label>
<input type="number" id="account" placeholder="Enter Account Sizing">

<label>Risk Per Trade (%)</label>
<input type="number" id="risk" placeholder="Enter Risk Per Trade">

<label>Stop Loss (₹ difference)</label>
<input type="number" id="stoploss" placeholder="Enter Stop Loss">

<button onclick="calculatePosition()">Calculate</button>

<div id="result"></div>

</div>

</div>

<script>

function calculatePosition(){

let account=document.getElementById("account").value;
let risk=document.getElementById("risk").value/100;
let stop=document.getElementById("stoploss").value;

let riskAmount=account*risk;

let positionSize=riskAmount/stop;

document.getElementById("result").innerHTML=
"You can buy "+Math.floor(positionSize)+" shares";

}

</script>

</body>
