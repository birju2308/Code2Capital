<title>Risk Reward Calculator - Code2Capital</title>

<link rel="stylesheet" href="sip.css">
</head>

<body>

<header>
  <h1>Code2Capital</h1>
  <a href="index.html">⬅ Back to Home</a>
</header>

<section class="container">
  <h2>Risk Reward Calculator</h2>

  <div class="calculator-card">
    
    <label>Entry Price (₹)</label>
    <input type="number" id="entry" placeholder="Enter entry price">

    <label>Stop Loss (₹)</label>
    <input type="number" id="stop" placeholder="Enter stop loss">

    <label>Target Price (₹)</label>
    <input type="number" id="target" placeholder="Enter target price">

    <button onclick="calculateRR()">Calculate</button>

    <div id="result"></div>

  </div>
</section>

<script>
function calculateRR(){
  let entry = parseFloat(document.getElementById("entry").value);
  let stop = parseFloat(document.getElementById("stop").value);
  let target = parseFloat(document.getElementById("target").value);

  if(isNaN(entry) || isNaN(stop) || isNaN(target)){
    document.getElementById("result").innerHTML = "Please fill all fields.";
    return;
  }

  let risk = entry - stop;
  let reward = target - entry;

  if(risk <= 0){
    document.getElementById("result").innerHTML = "Stop loss must be below entry price.";
    return;
  }

  let ratio = (reward / risk).toFixed(2);

  document.getElementById("result").innerHTML = `
    <p>Risk per Share: ₹${risk.toFixed(2)}</p>
    <p>Reward per Share: ₹${reward.toFixed(2)}</p>
    <p style="color:#22c55e;">Risk:Reward Ratio = 1 : ${ratio}</p>
  `;
}
</script>

</body>
